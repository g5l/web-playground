name: Deploy Tailwind POCs

on:
  push:
    branches: [master]
    paths:
      - 'pocs/CSS/tailwind/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pocs/CSS/tailwind/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: pocs/CSS/tailwind

      - name: Build
        run: npm run build
        working-directory: pocs/CSS/tailwind
        env:
          VITE_BASE: /web-playground/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pocs/CSS/tailwind/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
